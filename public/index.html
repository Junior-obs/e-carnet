<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    
    <!-- Identité Visuelle -->
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    
    <!-- Meta Tags SEO & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#10b981" />
    <meta
      name="description"
      content="E-CARNET - Plateforme de santé numérique au Sénégal. Votre carnet de santé, vos ordonnances et vos rendez-vous en un seul endroit."
    />

    <!-- Manifeste pour PWA (Installation sur écran d'accueil) -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Titre de l'application -->
    <title>E-CARNET | Votre Santé Numérique</title>

    <!-- Google Fonts (Optionnel - Pour un design plus premium) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <!-- Message si JS est désactivé -->
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: sans-serif;">
        <h1>JavaScript est requis</h1>
        <p>Veuillez activer JavaScript dans votre navigateur pour accéder à E-CARNET.</p>
      </div>
    </noscript>

    <!-- Point d'entrée de l'application React -->
    <div id="root"></div>

  </body>
</html>
